# Mosquitto MQTT broker configuration for GaggiMate local development
#
# This broker is used to relay MQTT messages between the GaggiMate device
# and Home Assistant for integration testing.
#
# The device publishes to topics under: gaggimate/#
# Home Assistant subscribes via autodiscovery on: homeassistant/#

# --- Network ---
# 'listener 1883' binds to all interfaces by default.
# For production, restrict with: listener 1883 <specific-ip>
listener 1883

# Allow unauthenticated connections for local development.
# For a production setup, set allow_anonymous false and configure
# a password file with: mosquitto_passwd -c /mosquitto/config/passwd <username>
allow_anonymous true

# --- Persistence ---
persistence true
persistence_location /mosquitto/data/

# --- Logging ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

log_type error
log_type warning
log_type notice
log_type information

# Log timestamps
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
