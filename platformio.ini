; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38-1
framework = arduino
monitor_speed = 115200
build_unflags =
    -std=gnu++11
check_flags = 
	cppcheck: --enable=all --inline-suppr --suppress=*:*/.pio/*
monitor_filters =
    esp32_exception_decoder
    time
    default

[display_common]
build_flags =
    -std=c++17
    -std=gnu++17
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_CONF_PATH="${platformio.src_dir}/display/lv_conf.h"
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DLV_CONF_SUPPRESS_DEFINE_CHECK
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_CMN
    -Os
    -DCONFIG_MAX_FILENAME_LEN=64
    -DCONFIG_MAX_URL_LEN=128
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=2
    -DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
    -DCONFIG_ASYNC_TCP_PRIORITY=10
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=64
    ; Upstream bumped to 8192 in 464be8c9. We need more still — 16384 is
    ; required under IDF 5.5 where esp_log / VFS stack frames plus JSON
    ; parse + SPIFFS read for `req:profiles:load` otherwise overflows on
    ; the first request (async_tcp task panic). Observed during Matter
    ; bring-up on pioarduino 55.x.
    -DCONFIG_ASYNC_TCP_STACK_SIZE=16384
    -DDEFAULT_MAX_WS_CLIENTS=3
lib_deps_default =
    FS
    SPIFFS
    Wire
    SPI
    ble_ota_dfu
    h2zero/NimBLE-Arduino@^2.3.0
    https://github.com/ESP32Async/AsyncTCP.git#v3.4.9
    https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.9.1
    bblanchon/ArduinoJson@^7.2.1
    256dpi/MQTT@^2.5.2
    ; Upstream PR 27 (salekseev:upgrade-nimble-2.5.0) pending merge at
    ; https://github.com/gaggimate/esp-arduino-ble-scales/pull/27 — ports
    ; to NimBLE-Arduino 2.x, which this tree needs for BLE coexistence with
    ; the esp-matter commissioning stack. Switch back to the upstream URL
    ; once the PR is merged.
    https://github.com/salekseev/esp-arduino-ble-scales.git#upgrade-nimble-2.5.0

[env:display]
board = LilyGo-T-RGB
framework = arduino, espidf
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = partitions/matter_16mb.csv
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.matter.defaults
; sdkconfig.defaults at project root is picked up by IDF in dual-framework mode.
; pioarduino's custom_sdkconfig is pure-arduino only — silently ignored here.
build_src_filter = -<*> +<display/> +<version.h>
extra_scripts =
	pre:scripts/auto_firmware_version.py
	pre:scripts/cxx_only_flags.py
	pre:scripts/patch_arduino_libs.py
lib_deps =
    ${display_common.lib_deps_default}
    lewisxhe/SensorLib @ 0.2.3
    bodmer/TFT_eSPI @ 2.5.43
	lvgl/lvgl @ 8.4.0
	moononournation/GFX Library for Arduino @ ^1.6.5
build_unflags =
    -std=gnu++11
    -std=gnu++2b
build_flags =
    ${display_common.build_flags}
    -DGAGGIMATE_MATTER
    -std=gnu++17

[env:display-headless]
; Headless 16 MB — same dual-framework + Matter stack as env:display but with
; driver/ui sources filtered out. Need cmake_extra_args override to add
; GAGGIMATE_HEADLESS_BUILD=1 so src/CMakeLists.txt excludes drivers/ui from
; the IDF glob (PlatformIO's build_src_filter doesn't apply at IDF level).
extends = env:display
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.matter.defaults -DGAGGIMATE_HEADLESS_BUILD=1
lib_deps =
    ${display_common.lib_deps_default}
build_flags =
    ${display_common.build_flags}
    -DGAGGIMATE_HEADLESS
    -DGAGGIMATE_MATTER
    -std=gnu++17
build_src_filter = -<*> +<display/> +<version.h> -<display/drivers/> -<display/ui/> -<display/lv_conf.h>

[env:display-headless-8m]
; 8 MB flash — dual-framework + Matter but no-OTA (5.5 MB firmware × 2 OTA
; slots won't fit in 8 MB). matter_8mb.csv has a single factory slot.
extends = env:display-headless
board = seeed_xiao_esp32s3
board_build.partitions = partitions/matter_8mb.csv
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.matter.defaults -DGAGGIMATE_HEADLESS_BUILD=1

[env:display-headless-4m]
; 4 MB flash — arduino-only, no Matter. 4 MB physically cannot hold the
; 5.5 MB Matter firmware even in single-slot layout. Pioarduino Arduino
; core 3.3.x upgrade only.
extends = env:display
framework = arduino
board = esp32-s3-supermini
board_build.partitions = max_app_4MB.csv
board_build.cmake_extra_args =
extra_scripts =
    pre:scripts/auto_firmware_version.py
    pre:scripts/cxx_only_flags.py
lib_deps =
    ${display_common.lib_deps_default}
build_flags =
    ${display_common.build_flags}
    -DGAGGIMATE_HEADLESS
build_src_filter = -<*> +<display/> +<version.h> -<display/drivers/> -<display/ui/> -<display/lv_conf.h>

[env:controller]
; Pioarduino 55.x — inherits platform from [env]. Arduino-only (no Matter).
board = Gaggimate-Controller
build_src_filter = -<*> +<controller/> +<version.h>
extra_scripts =
    pre:scripts/auto_firmware_version.py
lib_deps =
	GaggiMateController
	FS
	SPIFFS
	ble_ota_dfu
	h2zero/NimBLE-Arduino@^2.3.0
	bblanchon/ArduinoJson@^7.2.1
build_flags =
    -std=c++17
    -std=gnu++17
	-DCORE_DEBUG_LEVEL=3
