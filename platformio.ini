; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.38-1
framework = arduino
monitor_speed = 115200
; `deep+` is required because Arduino-bundled libs (HTTPUpdate etc.) declare
; transitive deps only via `#include`, not library.properties. `chain+` misses
; those — HTTPUpdate.cpp's `#include "WiFi.h"` fails to resolve. pioarduino 55.x
; defaults to `off`.
lib_ldf_mode = deep+
build_unflags =
    -std=gnu++11
check_flags =
	cppcheck: --enable=all --inline-suppr --suppress=*:*/.pio/*
monitor_filters =
    esp32_exception_decoder
    time
    default

[display_common]
build_flags =
    -std=c++17
    -std=gnu++17
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_CONF_PATH="${platformio.src_dir}/display/lv_conf.h"
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -DLV_CONF_SUPPRESS_DEFINE_CHECK
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_CMN
    -Os
    -DCONFIG_MAX_FILENAME_LEN=64
    -DCONFIG_MAX_URL_LEN=128
    -DCONFIG_NIMBLE_CPP_LOG_LEVEL=2
    -DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
    -DCONFIG_ASYNC_TCP_PRIORITY=10
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=64
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192
    -DDEFAULT_MAX_WS_CLIENTS=3
    ; Debug-only boot/trace heap profiler (utils.cpp:heap_checkpoint,
    ; measure_heap, heap_dump). Uncomment for PR-style per-subsystem
    ; HeapProfile ESP_LOGI traces. Runtime monitoring (60 s sampler,
    ; onFailedAlloc, panic hook) is always on via MemoryMonitor.cpp.
    ; -DGAGGIMATE_HEAP_PROFILE=1
lib_deps_default =
    FS
    SPIFFS
    Wire
    SPI
    Networking
    NetworkClientSecure
    WiFi
    HTTPClient
    HTTPUpdate
    Update
    ble_ota_dfu
    NimBLEComm
    OTA
    h2zero/NimBLE-Arduino@^2.5.0
    https://github.com/ESP32Async/AsyncTCP.git#v3.4.10
    https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.10.3
    bblanchon/ArduinoJson@^7.2.1
    256dpi/MQTT@^2.5.2
    ; Temporary: pending https://github.com/gaggimate/esp-arduino-ble-scales/pull/28
    https://github.com/salekseev/esp-arduino-ble-scales.git#feat/pioarduino-support
    homespan/HomeSpan@^2.1.7
    ; Heap / stack observability: sampler task, threshold callbacks with
    ; hysteresis, failed-alloc attribution, panic-hook snapshot. Superset of
    ; the hand-rolled utils.cpp helpers; tag-pinned for reproducibility.
    https://github.com/ESPToolKit/esp-memoryMonitor.git#v1.0.1

[env:display]
board = LilyGo-T-RGB
; Dual-framework: IDF drives the build with our sdkconfig.gaggimate.defaults
; (NimBLE host + WiFi/LWIP routed to PSRAM, ~50 KB internal heap headroom
; vs the pioarduino prebuilt). Arduino is pulled in as a CMake component.
; First build ~15-25 min; incremental builds are fast.
framework = arduino, espidf
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = partitions/default_16mb.csv
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.gaggimate.defaults -DPARTITION_CSV_PATH=${PROJECT_DIR}/partitions/default_16mb.csv
build_src_filter = -<*> +<display/> +<version.h>
; Keep this list TIGHT. pio's dual-framework lib_ignore fuzzy-matches against
; IDF component names — e.g. "BluetoothSerial" strips the `bt` component and
; kills NimBLE. Only name libs PIO's LDF actually tries to pull from PlatformIO
; land (not IDF components). ESP_SR is known to be pulled via deep+ scanning
; `Arduino.h` transitively.
lib_ignore =
    ESP_SR
extra_scripts =
	pre:scripts/auto_firmware_version.py
	pre:scripts/pioarduino_env.py
	pre:scripts/patch_arduino_libs.py
lib_deps =
    ${display_common.lib_deps_default}
    lewisxhe/SensorLib @ 0.2.3
    bodmer/TFT_eSPI @ 2.5.43
	lvgl/lvgl @ 8.4.0
	moononournation/GFX Library for Arduino @ ^1.6.5
build_unflags =
    -std=gnu++11
    -std=gnu++2b
build_flags =
    ${display_common.build_flags}
    -std=gnu++17

[env:display-headless]
; GAGGIMATE_HEADLESS_BUILD=1 drives src/CMakeLists.txt to exclude drivers/ui
; from the IDF glob (build_src_filter only applies to PlatformIO's scons).
extends = env:display
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.gaggimate.defaults -DGAGGIMATE_HEADLESS_BUILD=1
lib_deps =
    ${display_common.lib_deps_default}
build_flags =
    ${display_common.build_flags}
    -DGAGGIMATE_HEADLESS
    -std=gnu++17
build_src_filter = -<*> +<display/> +<version.h> -<display/drivers/> -<display/ui/> -<display/lv_conf.h>

[env:display-headless-8m]
extends = env:display-headless
board = seeed_xiao_esp32s3
board_build.partitions = partitions/default_8mb.csv
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.gaggimate.defaults -DGAGGIMATE_HEADLESS_BUILD=1

; 4 MB flash — pure arduino only. Dual-framework firmware won't fit in a
; single factory slot on this board.
[env:display-headless-4m]
extends = env:display-headless
framework = arduino
board = esp32-s3-supermini
board_build.partitions = max_app_4MB.csv
board_build.cmake_extra_args =
extra_scripts =
    pre:scripts/auto_firmware_version.py
    pre:scripts/pioarduino_env.py
lib_deps =
    ${display_common.lib_deps_default}
build_flags =
    ${display_common.build_flags}
    -DGAGGIMATE_HEADLESS
build_src_filter = -<*> +<display/> +<version.h> -<display/drivers/> -<display/ui/> -<display/lv_conf.h>

[env:controller]
board = Gaggimate-Controller
build_src_filter = -<*> +<controller/> +<version.h>
extra_scripts =
    pre:scripts/auto_firmware_version.py
    pre:scripts/pioarduino_env.py
lib_deps =
	GaggiMateController
	FS
	SPIFFS
	ble_ota_dfu
	h2zero/NimBLE-Arduino@^2.5.0
	bblanchon/ArduinoJson@^7.2.1
build_flags =
    -std=c++17
    -std=gnu++17
	-DCORE_DEBUG_LEVEL=3
