; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
; Pinned to 55.03.31-2 (Arduino 3.3.1 / IDF 5.5.1 + backports). IDF 5.5.2+
; (pioarduino 55.03.32 onward) ships a precompiled libbtdm_app.a whose
; btdm_controller_init → r_llm_env_init overflows its internal allocations
; on ESP32-S3 rev v0.2, corrupting TLSF metadata and crashing NimBLE bring-up.
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.31-2
framework = arduino, espidf
monitor_speed = 115200
lib_ldf_mode = deep+
build_unflags =
	-std=gnu++11
	-std=gnu++17
	-std=gnu++2b
check_flags =
	cppcheck: --enable=all --inline-suppr --suppress=*:*/.pio/*
monitor_filters =
	esp32_exception_decoder
	time
	default

[display_common]
build_flags =
	-std=gnu++20
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_CONF_PATH="${platformio.src_dir}/display/lv_conf.h"
	-DDISABLE_ALL_LIBRARY_WARNINGS
	-DLV_CONF_SUPPRESS_DEFINE_CHECK
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_CMN
	-Os
	-DCONFIG_MAX_FILENAME_LEN=64
	-DCONFIG_MAX_URL_LEN=128
	-DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
	-DCONFIG_ASYNC_TCP_RUNNING_CORE=0
	-DCONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
	-DCONFIG_ASYNC_TCP_PRIORITY=10
	-DCONFIG_ASYNC_TCP_QUEUE_SIZE=64
	-DCONFIG_ASYNC_TCP_STACK_SIZE=8192
	-DDEFAULT_MAX_WS_CLIENTS=3
lib_deps_default =
	FS
	SPIFFS
	Wire
	SPI
	Networking
	NetworkClientSecure
	WiFi
	HTTPClient
	HTTPUpdate
	Update
	ble_ota_dfu
	NanoPbComm
	OTA
	nanopb/Nanopb@^0.4.9
	https://github.com/ESP32Async/AsyncTCP.git#v3.4.10
	https://github.com/ESP32Async/ESPAsyncWebServer.git#v3.10.3
	bblanchon/ArduinoJson@^7.2.1
	256dpi/MQTT@^2.5.2
	; Pinned to a commit SHA (not the mutable feat/esp-nimble-cpp branch) for
	; reproducible builds. Temp fork pending upstream gaggimate/esp-arduino-ble-scales#28;
	; bump this SHA when the fork advances.
	https://github.com/salekseev/esp-arduino-ble-scales.git#1daafb4eb5793e23f3d0857a14bc1d21afe7c249
	homespan/HomeSpan@^2.1.7
	https://github.com/ESPToolKit/esp-memoryMonitor.git#v1.0.1

; Shared IDF / dual-framework keys referenced by the display and controller
; envs (the env-section equivalent of [display_common]). nanopb generates
; gaggimate.pb.{c,h} from the .proto at build time; the component_remove list
; strips managed components we never use to cut first-build time + flash.
[idf_common]
custom_nanopb_protos =
	+<lib/NanoPbComm/proto/gaggimate.proto>
custom_nanopb_options =
	--error-on-unmatched
lib_ignore =
	ESP_SR
custom_component_remove =
	chmorgan/esp-libhelix-mp3
	espressif/cbor
	espressif/esp-dsp
	espressif/esp-modbus
	espressif/esp-sr
	espressif/esp-zboss-lib
	espressif/esp-zigbee-lib
	espressif/esp_diag_data_store
	espressif/esp_diagnostics
	espressif/esp_insights
	espressif/esp_modem
	espressif/esp_rainmaker
	espressif/qrcode
	espressif/rmaker_common
	espressif/lan867x

[env:display]
board = LilyGo-T-RGB
upload_speed = 921600
board_build.filesystem = spiffs
board_build.partitions = partitions/default_16mb.csv
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.common.defaults;sdkconfig.gaggimate.defaults
build_src_filter = -<*> +<display/> +<version.h>
custom_nanopb_protos = ${idf_common.custom_nanopb_protos}
custom_nanopb_options = ${idf_common.custom_nanopb_options}
lib_ignore = ${idf_common.lib_ignore}
custom_component_remove = ${idf_common.custom_component_remove}
extra_scripts =
	pre:scripts/auto_firmware_version.py
	pre:scripts/pioarduino_env.py
lib_deps =
	${display_common.lib_deps_default}
	lewisxhe/SensorLib @ 0.2.3
	bodmer/TFT_eSPI @ 2.5.43
	lvgl/lvgl @ 8.4.0
	moononournation/GFX Library for Arduino @ ^1.6.5
build_flags =
	${display_common.build_flags}

[env:display-headless]
extends = env:display
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.common.defaults;sdkconfig.gaggimate.defaults -DGAGGIMATE_HEADLESS_BUILD=1
lib_deps = ${display_common.lib_deps_default}
build_flags =
	${display_common.build_flags}
	-DGAGGIMATE_HEADLESS
build_src_filter = -<*> +<display/> +<version.h> -<display/drivers/> -<display/ui/> -<display/lv_conf.h>

[env:display-headless-8m]
extends = env:display-headless
board = seeed_xiao_esp32s3
board_build.partitions = partitions/default_8mb.csv

[env:controller]
board = Gaggimate-Controller
board_build.partitions = partitions/default_8mb.csv
board_build.cmake_extra_args = -DEXECUTABLE_COMPONENT_NAME=src -DSDKCONFIG_DEFAULTS=sdkconfig.common.defaults;sdkconfig.controller.defaults -DGAGGIMATE_CONTROLLER_BUILD=1
build_src_filter = -<*> +<controller/> +<version.h>
custom_nanopb_protos = ${idf_common.custom_nanopb_protos}
custom_nanopb_options = ${idf_common.custom_nanopb_options}
lib_ignore = ${idf_common.lib_ignore}
; Controller also strips libsodium (no HomeSpan HAP crypto on this side).
custom_component_remove =
	${idf_common.custom_component_remove}
	espressif/libsodium
extra_scripts =
	pre:scripts/auto_firmware_version.py
	pre:scripts/pioarduino_env.py
lib_deps =
	GaggiMateController
	FS
	SPIFFS
	ble_ota_dfu
	NanoPbComm
	nanopb/Nanopb@^0.4.9
	bblanchon/ArduinoJson@^7.2.1
build_flags =
	-std=gnu++20
	-DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1

; Native-host env for Autotune SIMC unit tests. Autotune.cpp = STL-only, so
; `pio test -e native_autotune` runs host-side, no ESP32/Arduino runtime.
; Unity framework shipped with PlatformIO.
[env:native_autotune]
platform = native
framework =
lib_ldf_mode = off
lib_deps =
	throwtheswitch/Unity@^2.6.0
test_framework = unity
test_filter = test_autotune_simc
; Test TU includes Autotune.cpp directly (see #include at top of
; test_autotune_simc.cpp) — native linker skips NayrodPID's Arduino-dependent
; siblings (SimplePID, SimpleKalmanFilter, ...).
build_unflags =
	-std=gnu++11
build_flags =
	-std=c++17
	-I lib/NayrodPID/src
	-Wno-unused-variable
	-Wno-unused-function
